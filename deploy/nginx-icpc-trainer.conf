limit_req_zone $binary_remote_addr zone=icpc_api:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name 114.55.130.137;
    return 301 https://114.55.130.137$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 114.55.130.137;

    ssl_certificate /etc/letsencrypt/live/114.55.130.137/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/114.55.130.137/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ICPCSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    client_max_body_size 3m;

    location /icpc-api/ {
        limit_req zone=icpc_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 180s;
        proxy_send_timeout 30s;
    }

    location / {
        return 302 https://icpc-trainer-shallowdream.safe-chime-4451.chatgpt.site$request_uri;
    }
}
