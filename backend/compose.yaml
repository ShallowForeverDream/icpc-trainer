services:
  api:
    build: .
    container_name: icpc-trainer-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    mem_limit: 192m
    cpus: 0.75
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
