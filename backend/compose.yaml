services:
  api:
    build: .
    container_name: icpc-trainer-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      DB_PATH: /data/icpc-trainer.sqlite
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://icpc-trainer-shallowdream.safe-chime-4451.chatgpt.site,http://localhost:3000,http://localhost:5173}
      TRANSLATOR_BASE_URL: http://llama:8080
      TRANSLATOR_MODEL: ${TRANSLATOR_MODEL:-qwen2.5-1.5b-instruct}
    volumes:
      - icpc-trainer-data:/data
    mem_limit: 512m
    cpus: 0.50
    depends_on:
      llama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: icpc-trainer-llama
    restart: unless-stopped
    command: ["-m", "/models/qwen2.5-1.5b-instruct-q4_k_m.gguf", "--host", "0.0.0.0", "--port", "8080", "--alias", "qwen2.5-1.5b-instruct", "--jinja", "-c", "8192", "-t", "3"]
    volumes:
      - icpc-trainer-models:/models
    mem_limit: 2304m
    cpus: 2.00

volumes:
  icpc-trainer-data:
  icpc-trainer-models:
