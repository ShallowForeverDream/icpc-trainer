services:
  api:
    build: .
    container_name: icpc-trainer-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      DB_PATH: /data/icpc-trainer.sqlite
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - icpc-trainer-data:/data
    mem_limit: 192m
    cpus: 0.75
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  icpc-trainer-data:
